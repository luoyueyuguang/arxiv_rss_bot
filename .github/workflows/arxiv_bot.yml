name: arXiv Bot Daily Update

concurrency:
  group: paper-updates-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [ main, master ]
    paths:
      - 'config.json'
      - 'arxiv_bot.py'
      - 'CUSTOM_RULES.md'
      - 'example_custom_rules.py'
      - 'ai_summary_prompt.txt'
      - 'README.template.md'
      - 'rss_service.py'
      - 'requirements*.txt'
      - 'setup.py'
      - 'pyproject.toml'
      - 'LICENSE'
      - 'pytest.ini'
      - 'tests/**'
      - '.github/workflows/arxiv_bot.yml'
  schedule:
    - cron: '40 5 * * 1-5' # 13:40 Asia/Shanghai, Monday-Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper git operations
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run offline test suite
      run: pytest --cov=arxiv_bot --cov=base_conference_bot --cov=run_all_bots --cov-fail-under=50
        
    - name: Run arXiv Bot
      env:
        ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      run: |
        python arxiv_bot.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md summary_cache.json
        git diff --staged --quiet || git commit -m "🤖 Update papers from arXiv - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        for i in 1 2 3 4 5; do
          git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
          echo "Push attempt $i failed, retrying in 5s..."
          sleep 5
        done
        
    - name: Show updated papers count
      run: |
        echo "📊 Papers updated in README.md"
        grep -c "### [0-9]*\." README.md || echo "No papers found" 
