name: Update Conference Papers

concurrency:
  group: paper-updates-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [ main, master ]
    paths:
      - "bots/**"
      - "base_conference_bot.py"
      - "config.json"
      - "run_all_bots.py"
      - "requirements*.txt"
      - "setup.py"
      - "pyproject.toml"
      - "LICENSE"
      - "pytest.ini"
      - "tests/**"
  workflow_dispatch:
    inputs:
      bots:
        description: "Bots to run (comma-separated: arch,hpc,sys,chip,ai,num,iclr or all)"
        required: false
        default: "all"
  schedule:
    - cron: "0 6 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run offline test suite
        run: pytest --cov=arxiv_bot --cov=base_conference_bot --cov=run_all_bots --cov-fail-under=50

      - name: Run conference bots
        id: run-bots
        run: |
          set +e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BOTS_INPUT="${{ github.event.inputs.bots }}"
            if [ "$BOTS_INPUT" = "all" ]; then
              python run_all_bots.py all
            else
              python run_all_bots.py $(echo $BOTS_INPUT | tr ',' ' ')
            fi
          else
            python run_all_bots.py all
          fi
          BOT_EXIT_CODE=$?
          echo "BOT_EXIT_CODE=${BOT_EXIT_CODE}" >> "${GITHUB_ENV}"
          exit 0

      - name: Commit changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conferences/
          git commit -m "Update conference papers"

      - name: Push changes
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Report bot failures
        if: always()
        run: |
          if [ "${BOT_EXIT_CODE:-1}" -ne 0 ]; then
            echo "One or more conference bots failed; successful bot updates were preserved."
            exit 1
          fi
