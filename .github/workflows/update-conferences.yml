name: Update Conference Papers

on:
  push:
    branches: [ main, master ]
    paths:
      - "bots/**"
      - "base_conference_bot.py"
      - "config.json"
      - "run_all_bots.py"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      bots:
        description: "Bots to run (comma-separated: arch,hpc,sys,chip,ai,num or all)"
        required: false
        default: "all"
  schedule:
    - cron: "0 6 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run conference bots
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BOTS_INPUT="${{ github.event.inputs.bots }}"
            if [ "$BOTS_INPUT" = "all" ]; then
              python run_all_bots.py all
            else
              python run_all_bots.py $(echo $BOTS_INPUT | tr ',' ' ')
            fi
          else
            python run_all_bots.py all
          fi

      - name: Run ICLR bot (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: python -m iclr_bot

      - name: Commit changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add conferences/arch/ conferences/hpc/ conferences/sys/ conferences/chip/ conferences/ai/ conferences/num/
          git add iclr/README.md iclr/iclr_cache.json 2>/dev/null || true
          git commit -m "Update conference papers"

      - name: Push changes
        run: |
          git pull --rebase origin master
          git push
